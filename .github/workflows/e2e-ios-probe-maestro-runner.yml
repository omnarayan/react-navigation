name: Probe E2E iOS — maestro-runner (WDA / devicelab)

# Manual trigger only. Same environment as the maestro probe workflow, but
# uses maestro-runner (downloaded from open.devicelab.dev) instead of
# upstream maestro. Lets you compare drivers head-to-head on the same
# CI machine.
#
# The run-name below interpolates the chosen driver into the run title
# (e.g. "iOS — maestro-runner [wda] — 1.1.16-rc.9") so the runs list
# shows which driver each dispatch used without opening the run.

run-name: iOS — maestro-runner [${{ inputs.driver }}] — ${{ inputs.maestro_runner_version }}

on:
  workflow_dispatch:
    inputs:
      flows:
        description: "Space-separated flow files (relative to example/e2e/maestro/)"
        type: string
        default: "bottom-tabs.yml stack-basic.yml auth-flow.yml drawer-master-detail.yml"
      release_tag:
        description: "Release tag holding ReactNavigationExample.app.tar.gz (probe-app-latest = daily build, probe-app-v2 = pinned)"
        type: string
        default: "probe-app-latest"
      driver:
        description: "maestro-runner driver to use"
        type: choice
        options: [wda, devicelab]
        default: wda
      maestro_runner_version:
        description: "maestro-runner version (downloaded from open.devicelab.dev unless maestro_runner_url is set)"
        type: string
        default: "1.1.15"
      maestro_runner_url:
        description: "Override download URL for the darwin-arm64 tarball (e.g. a fork release for testing pre-release builds). When set, ignores maestro_runner_version."
        type: string
        default: ""

jobs:
  maestro-runner-ios:
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      MAESTRO_RUNNER_VERSION: ${{ inputs.maestro_runner_version }}
      JAVA_DISTRIBUTION: zulu
      JAVA_VERSION: '17'
      SIMULATOR_NAME: iPhone 17 Pro

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Xcode 26.3 (match upstream CI)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Setup JDK (Zulu 17)
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install Node + Yarn
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache JS dependencies
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules
            ~/.cache/yarn
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock', 'example/yarn.lock') }}
          restore-keys: |
            yarn-${{ runner.os }}-

      - name: Install JS dependencies
        run: yarn install --immutable

      - name: Download pre-built debug .app
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p ios-debug-build
          gh release download "${{ inputs.release_tag }}" \
            --pattern "ReactNavigationExample.app.tar.gz" \
            --output /tmp/app.tar.gz
          tar -xzf /tmp/app.tar.gz -C ios-debug-build

      - name: Install maestro-runner
        env:
          GH_TOKEN: ${{ github.token }}
          MAESTRO_RUNNER_URL: ${{ inputs.maestro_runner_url }}
        run: |
          if [ -n "$MAESTRO_RUNNER_URL" ]; then
            echo "Override URL set; downloading from: $MAESTRO_RUNNER_URL"
            # If it's a GitHub release URL, use gh; else curl
            if [[ "$MAESTRO_RUNNER_URL" == https://github.com/*/releases/* ]]; then
              maestro_runner_url="$MAESTRO_RUNNER_URL"
            else
              maestro_runner_url="$MAESTRO_RUNNER_URL"
            fi
          else
            maestro_runner_url="https://open.devicelab.dev/download/maestro-runner/${MAESTRO_RUNNER_VERSION}/maestro-runner-${MAESTRO_RUNNER_VERSION}-darwin-arm64.tar.gz"
          fi
          mkdir -p /tmp/maestro-runner-dl
          curl -fsSL "$maestro_runner_url" -o /tmp/maestro-runner-dl/mr.tar.gz
          tar -xzf /tmp/maestro-runner-dl/mr.tar.gz -C /tmp/maestro-runner-dl
          mkdir -p "$HOME/.maestro-runner"
          # The archive layout puts everything under a `maestro-runner/` top-level dir.
          cp -R /tmp/maestro-runner-dl/maestro-runner/. "$HOME/.maestro-runner/"
          echo "$HOME/.maestro-runner/bin" >> $GITHUB_PATH

      - name: Stage bundled drivers next to working dir
        # maestro-runner 1.1.15 resolves drivers/ios/WebDriverAgent relative to
        # CWD, not relative to the binary. Without this symlink the WDA driver
        # treats the bundled WDA as missing and tries to fetch from GitHub at
        # runtime — which 403s on CI runners (unauthenticated rate limit on a
        # shared IP).
        run: ln -sf "$HOME/.maestro-runner/drivers" "$GITHUB_WORKSPACE/example/drivers"

      - name: Boot iOS Simulator + pre-approve scheme
        timeout-minutes: 5
        run: |
          DEVICE_ID=$(xcrun simctl list devices available | grep "$SIMULATOR_NAME" | head -n 1 | awk -F "[()]" '{print $2}')
          if [ -z "$DEVICE_ID" ]; then
            echo "No $SIMULATOR_NAME available."
            xcrun simctl list devices available
            exit 1
          fi
          xcrun simctl boot "$DEVICE_ID" || true
          while ! xcrun simctl list devices | grep "$DEVICE_ID" | grep -q "(Booted)"; do
            sleep 2
          done
          PLIST=~/Library/Developer/CoreSimulator/Devices/${DEVICE_ID}/data/Library/Preferences/com.apple.launchservices.schemeapproval.plist
          mkdir -p "$(dirname "$PLIST")"
          /usr/libexec/PlistBuddy "$PLIST" -c "add com.apple.CoreSimulator.CoreSimulatorBridge-->rne string org.reactnavigation.playground" 2>/dev/null || \
          /usr/libexec/PlistBuddy "$PLIST" -c "set com.apple.CoreSimulator.CoreSimulatorBridge-->rne org.reactnavigation.playground"
          echo "DEVICE_ID=$DEVICE_ID" >> $GITHUB_ENV

      - name: Install app on simulator
        run: xcrun simctl install "$DEVICE_ID" ios-debug-build/ReactNavigationExample.app

      - name: Start Metro bundler
        run: yarn --cwd example start &

      - name: Wait for Metro bundler
        timeout-minutes: 5
        run: |
          until curl -sSf "http://localhost:8081/.expo/.virtual-metro-entry.bundle?platform=ios&dev=true&minify=false" > /dev/null 2>&1; do
            sleep 2
          done

      - name: Capture simulator log in background
        run: xcrun simctl spawn booted log stream --style syslog > $HOME/mr-simulator.log 2>&1 &

      - name: Run maestro-runner flows
        working-directory: example
        run: |
          set -uo pipefail
          # Build the initial flow arg list (relative paths under example/).
          FLOWS=""
          for f in ${{ inputs.flows }}; do
            FLOWS="$FLOWS e2e/maestro/$f"
          done

          # Initial pass — run the full suite.
          set -x
          maestro-runner \
            --driver "${{ inputs.driver }}" \
            --platform ios \
            test --output /tmp/mr-report --flatten \
            -e APP_ID=org.reactnavigation.playground \
            -e APP_SCHEME=rne:// \
            $FLOWS
          EXIT=$?
          set +x

          # Retry only the failed flows up to 3 times. Mirrors upstream
          # maestro's scripts/maestro.ts pattern: parse the report, identify
          # failures, re-run just those, repeat. Each retry has its own
          # output dir so the previous report stays intact for diagnostics.
          REPORT=/tmp/mr-report/report.json
          for attempt in 1 2 3; do
            if [ "$EXIT" -eq 0 ]; then break; fi
            if [ ! -f "$REPORT" ]; then
              echo "::warning::No report.json after attempt $attempt (likely a setup-level failure); skipping flow retry."
              break
            fi
            FAILED_FLOWS=$(jq -r '.flows[] | select(.status == "failed") | .sourceFile' "$REPORT" 2>/dev/null | xargs -n1 basename | tr '\n' ' ')
            if [ -z "$FAILED_FLOWS" ]; then
              # Exit was nonzero but no flows are marked failed in the
              # report — probably a setup-level failure. Don't retry.
              echo "::warning::Exit $EXIT but no flow-level failures found; skipping flow retry."
              break
            fi
            echo "::group::Retry #$attempt — re-running failed flows: $FAILED_FLOWS"
            RETRY_FLOWS=""
            for f in $FAILED_FLOWS; do RETRY_FLOWS="$RETRY_FLOWS e2e/maestro/$f"; done

            set -x
            maestro-runner \
              --driver "${{ inputs.driver }}" \
              --platform ios \
              test --output "/tmp/mr-report-retry-$attempt" --flatten \
              -e APP_ID=org.reactnavigation.playground \
              -e APP_SCHEME=rne:// \
              $RETRY_FLOWS
            RETRY_EXIT=$?
            set +x
            echo "::endgroup::"

            if [ "$RETRY_EXIT" -eq 0 ]; then
              echo "::notice::Retry #$attempt cleared all failed flows."
              EXIT=0
              break
            fi
            # Continue: target the new retry report's failures next iteration.
            REPORT="/tmp/mr-report-retry-$attempt/report.json"
          done

          exit $EXIT

      - name: Upload reports + logs on failure
        if: failure() || cancelled() || always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-runner-output-${{ inputs.driver }}
          path: |
            /tmp/mr-report/**/*
            /tmp/mr-report-retry-*/**/*
            ~/mr-simulator.log
            ~/Library/Logs/maestro/xctest_runner_logs/*
            ~/.maestro-runner/cache/devicelab-ios-runner-builds/*/logs/*
            ~/.maestro-runner/cache/wda-builds/*/logs/*
          include-hidden-files: true
          if-no-files-found: warn
          overwrite: true
