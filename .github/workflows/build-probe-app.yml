name: Build Probe App (iOS Sim debug)

# Manual trigger. Replicates upstream's e2e-ios.yml build steps verbatim:
# `yarn expo prebuild --platform ios` + `xcodebuild ... -configuration Debug
# -destination 'generic/platform=iOS Simulator'`. The resulting .app includes
# all native deps (react-native-bottom-tabs / RNSTabsHostiOS etc.) that
# probe-app-v1 was missing. Uploaded to a fork release so both probe
# workflows can download the same artifact for apples-to-apples runs.

on:
  workflow_dispatch:
    inputs:
      target_tag:
        description: "Release tag to (re-)create with the built .app"
        type: string
        default: "probe-app-v2"

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      JAVA_DISTRIBUTION: zulu
      JAVA_VERSION: '17'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Xcode 26.3 (match upstream CI)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Setup JDK (Zulu 17)
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install Node + Yarn
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JS dependencies
        run: yarn install --immutable

      - name: Build iOS App (upstream-equivalent)
        working-directory: example
        run: |
          set -euxo pipefail
          yarn expo prebuild --platform ios
          xcodebuild ONLY_ACTIVE_ARCH=YES \
            -workspace ios/ReactNavigationExample.xcworkspace \
            -UseNewBuildSystem=YES \
            -scheme ReactNavigationExample \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -sdk iphonesimulator \
            -derivedDataPath ios/build \
            -quiet

      - name: Package .app
        run: |
          set -euxo pipefail
          mkdir -p out
          cp -R example/ios/build/Build/Products/Debug-iphonesimulator/ReactNavigationExample.app out/
          cd out
          tar -czf ReactNavigationExample.app.tar.gz ReactNavigationExample.app
          ls -lh ReactNavigationExample.app.tar.gz

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.target_tag }}
        run: |
          set -euxo pipefail
          # If the release exists, replace the asset; otherwise create a new one.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists — uploading asset (clobbering if present)"
            gh release upload "$TAG" out/ReactNavigationExample.app.tar.gz --clobber
          else
            echo "Creating release $TAG"
            gh release create "$TAG" \
              --title "Probe app ($TAG, Debug iOS Sim arm64, full native deps)" \
              --notes "Built from $(git rev-parse --short HEAD) on $(date -u +%Y-%m-%dT%H:%M:%SZ). Includes RNSTabsHostiOS and all native deps via expo prebuild + pod install." \
              out/ReactNavigationExample.app.tar.gz
          fi

      - name: Upload artifact (also available without release)
        uses: actions/upload-artifact@v4
        with:
          name: ReactNavigationExample-app
          path: out/ReactNavigationExample.app.tar.gz
          if-no-files-found: error
          overwrite: true
