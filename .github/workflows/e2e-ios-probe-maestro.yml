name: Probe E2E iOS — Maestro

# Manual trigger only. Mirrors the upstream E2E iOS workflow but skips the
# 10+ min xcodebuild step by downloading a pre-built debug .app from a
# release on this fork. Runs only a handful of representative flows.

on:
  workflow_dispatch:
    inputs:
      flows:
        description: "Space-separated flow files (relative to example/e2e/maestro/)"
        type: string
        default: "bottom-tabs.yml stack-basic.yml auth-flow.yml drawer-master-detail.yml"
      release_tag:
        description: "Release tag holding ReactNavigationExample.app.tar.gz"
        type: string
        default: "probe-app-v2"

jobs:
  maestro-ios:
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      MAESTRO_VERSION: 2.2.0
      MAESTRO_CLI_NO_ANALYTICS: 1
      MAESTRO_DRIVER_STARTUP_TIMEOUT: 600000
      JAVA_DISTRIBUTION: zulu
      JAVA_VERSION: '17'
      SIMULATOR_NAME: iPhone 17 Pro

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Xcode 26.3 (match upstream CI)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Setup JDK (Zulu 17, match upstream CI)
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install Node + Yarn
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache JS dependencies
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules
            ~/.cache/yarn
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock', 'example/yarn.lock') }}
          restore-keys: |
            yarn-${{ runner.os }}-

      - name: Install JS dependencies
        run: yarn install --immutable

      - name: Download pre-built debug .app
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p ios-debug-build
          gh release download "${{ inputs.release_tag }}" \
            --pattern "ReactNavigationExample.app.tar.gz" \
            --output /tmp/app.tar.gz
          tar -xzf /tmp/app.tar.gz -C ios-debug-build
          ls -la ios-debug-build/

      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Boot iOS Simulator + pre-approve scheme
        timeout-minutes: 5
        run: |
          DEVICE_ID=$(xcrun simctl list devices available | grep "$SIMULATOR_NAME" | head -n 1 | awk -F "[()]" '{print $2}')
          if [ -z "$DEVICE_ID" ]; then
            echo "No $SIMULATOR_NAME available."
            xcrun simctl list devices available
            exit 1
          fi
          echo "Booting $SIMULATOR_NAME ($DEVICE_ID)..."
          xcrun simctl boot "$DEVICE_ID" || true
          while ! xcrun simctl list devices | grep "$DEVICE_ID" | grep -q "(Booted)"; do
            sleep 2
          done
          echo "Booted!"
          # Pre-approve the rne:// scheme — avoids the system "Open in app?" prompt
          PLIST=~/Library/Developer/CoreSimulator/Devices/${DEVICE_ID}/data/Library/Preferences/com.apple.launchservices.schemeapproval.plist
          mkdir -p "$(dirname "$PLIST")"
          /usr/libexec/PlistBuddy "$PLIST" -c "add com.apple.CoreSimulator.CoreSimulatorBridge-->rne string org.reactnavigation.playground" 2>/dev/null || \
          /usr/libexec/PlistBuddy "$PLIST" -c "set com.apple.CoreSimulator.CoreSimulatorBridge-->rne org.reactnavigation.playground"
          echo "DEVICE_ID=$DEVICE_ID" >> $GITHUB_ENV

      - name: Install app on simulator
        run: xcrun simctl install "$DEVICE_ID" ios-debug-build/ReactNavigationExample.app

      - name: Start Metro bundler
        run: yarn --cwd example start &

      - name: Wait for Metro bundler
        timeout-minutes: 5
        run: |
          until curl -sSf "http://localhost:8081/.expo/.virtual-metro-entry.bundle?platform=ios&dev=true&minify=false" > /dev/null 2>&1; do
            sleep 2
          done

      - name: Capture simulator log in background
        run: xcrun simctl spawn booted log stream --style syslog > $HOME/maestro-simulator.log 2>&1 &

      - name: Run Maestro flows
        working-directory: example
        run: |
          set -x
          # Convert space-separated flow names to full paths
          FLOWS=""
          for f in ${{ inputs.flows }}; do
            FLOWS="$FLOWS e2e/maestro/$f"
          done
          maestro test \
            -e APP_ID=org.reactnavigation.playground \
            -e APP_SCHEME=rne:// \
            $FLOWS

      - name: Upload debug output on failure
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-debug-output
          path: |
            example/maestro-debug-output/**/*
            ~/Library/Logs/maestro/xctest_runner_logs/*
            ~/maestro-simulator.log
          include-hidden-files: true
          overwrite: true
